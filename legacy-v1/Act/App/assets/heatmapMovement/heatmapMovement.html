<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="/App/assets/heatmapMovement/heatmapMovement.css" />
</head>

<body>

    <div class="button-container">
        <div class="slide" id="slide"></div>
        <button class="button" id="closeButtonHeatmapM">
            <span class="X"></span>
            <span class="Y"></span>
        </button>
    </div>
    <div class="card">
        <div class="one">


            <span class="title">Heatmap Control Panel</span>
            <div class="music">
                <img src="/img/interconectados.png" width="32" height="32" />
            </div>
            <span class="name">
                <div></div>
                Map
            </span>
            <div class="bar">
                <button title="Retroceder" id="retrocederHeatmapButton">
                    <i class="fa-solid fa-backward"></i>
                </button>
                <button title="Reproducir" id="reproducirHeatmapButton">
                    <i class="fas fa-play"></i>
                </button>
                <button title="Avanzar" id="avanzarHeatmapButton">
                    <i class="fa-solid fa-forward"></i>
                </button>
            </div>
            <div class="barTime">
                <p class="timetext time_now">1:31</p>
                <div class="time">
                    <div class="elapsed"></div>
                </div>
                <p class="timetext time_full">3:46</p>
            </div>
        </div>
        <div class="two"></div>
        <div class="three"></div>
    </div>
</body>

</html>
