<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/App/assets/LayerPanel/layerPanel.css" />

    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>

<body>
    <div class="button-containerL">
        <div class="slideL" id="slide"></div>
        <button class="closeL" id="closeButtonLayerPanel">
            <span class="X"></span>
            <span class="Y"></span>
        </button>
    </div>
    <div class="drop">
        <p class="fancy-text">Layer Panel</p>

        <div class="containerAnimate">
            <div class="item" style="--i: 0"></div>
            <div class="item" style="--i: 1"></div>
            <div class="item" style="--i: 2"></div>
            <div class="item" style="--i: 3"></div>
            <div class="item" style="--i: 4"></div>
            <div class="item" style="--i: 5"></div>
            <div class="item" style="--i: 6"></div>
            <div class="item" style="--i: 7"></div>
            <div class="item" style="--i: 8"></div>
            <div class="item" style="--i: 9"></div>
            <div class="item" style="--i: 10"></div>
            <div class="item" style="--i: 11"></div>
            <div class="item" style="--i: 12"></div>
            <div class="item" style="--i: 13"></div>
            <div class="item" style="--i: 14"></div>
            <div class="item" style="--i: 15"></div>
            <div class="item" style="--i: 16"></div>
            <div class="item" style="--i: 17"></div>
            <div class="item" style="--i: 18"></div>
            <div class="item" style="--i: 19"></div>
            <div class="item" style="--i: 20"></div>
        </div>
        <div class="drop__container" id="drop-items">
            <div class="drop__card">
                <div class="drop__data">
                    <svg style="margin-right: 5px" class="grab" width="18" height="18" viewBox="0 0 16 16" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path fillRule="evenodd" clipRule="evenodd"
                            d="M5 4C5.55228 4 6 3.55228 6 3C6 2.44772 5.55228 2 5 2C4.44772 2 4 2.44772 4 3C4 3.55228 4.44772 4 5 4ZM6 8C6 8.55228 5.55228 9 5 9C4.44772 9 4 8.55228 4 8C4 7.44772 4.44772 7 5 7C5.55228 7 6 7.44772 6 8ZM6 13C6 13.5523 5.55228 14 5 14C4.44772 14 4 13.5523 4 13C4 12.4477 4.44772 12 5 12C5.55228 12 6 12.4477 6 13ZM12 8C12 8.55228 11.5523 9 11 9C10.4477 9 10 8.55228 10 8C10 7.44772 10.4477 7 11 7C11.5523 7 12 7.44772 12 8ZM11 14C11.5523 14 12 13.5523 12 13C12 12.4477 11.5523 12 11 12C10.4477 12 10 12.4477 10 13C10 13.5523 10.4477 14 11 14ZM12 3C12 3.55228 11.5523 4 11 4C10.4477 4 10 3.55228 10 3C10 2.44772 10.4477 2 11 2C11.5523 2 12 2.44772 12 3Z"
                            fill="currentColor"></path>
                    </svg>
                    <img src="/img/mapaDeCalor.jpg" alt="" class="drop__img" />
                    <div>
                        <h1 class="drop__name">Heat Map</h1>

                        <input id="myRange1" class="sliderlp" value="100" max="100" min="0" type="range" />
                    </div>
                </div>

                <div class="checkbox-wrapper">
                    <input id="_checkbox-1" type="checkbox" />
                    <label for="_checkbox-1">
                        <div class="tick_mark"></div>
                    </label>
                </div>
            </div>

            <div class="drop__card">
                <div class="drop__data">
                    <svg style="margin-right: 5px" class="grab" width="18" height="18" viewBox="0 0 16 16" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path fillRule="evenodd" clipRule="evenodd"
                            d="M5 4C5.55228 4 6 3.55228 6 3C6 2.44772 5.55228 2 5 2C4.44772 2 4 2.44772 4 3C4 3.55228 4.44772 4 5 4ZM6 8C6 8.55228 5.55228 9 5 9C4.44772 9 4 8.55228 4 8C4 7.44772 4.44772 7 5 7C5.55228 7 6 7.44772 6 8ZM6 13C6 13.5523 5.55228 14 5 14C4.44772 14 4 13.5523 4 13C4 12.4477 4.44772 12 5 12C5.55228 12 6 12.4477 6 13ZM12 8C12 8.55228 11.5523 9 11 9C10.4477 9 10 8.55228 10 8C10 7.44772 10.4477 7 11 7C11.5523 7 12 7.44772 12 8ZM11 14C11.5523 14 12 13.5523 12 13C12 12.4477 11.5523 12 11 12C10.4477 12 10 12.4477 10 13C10 13.5523 10.4477 14 11 14ZM12 3C12 3.55228 11.5523 4 11 4C10.4477 4 10 3.55228 10 3C10 2.44772 10.4477 2 11 2C11.5523 2 12 2.44772 12 3Z"
                            fill="currentColor"></path>
                    </svg>
                    <img src="/img/grilla.png" alt="" class="drop__img" />
                    <div>
                        <h1 class="drop__name">Grid</h1>

                        <input id="myRange2" class="sliderlp" value="100" max="100" min="0" type="range" />
                    </div>
                </div>

                <div class="checkbox-wrapper">
                    <input id="_checkbox-2" type="checkbox" />
                    <label for="_checkbox-2">
                        <div class="tick_mark"></div>
                    </label>
                </div>
            </div>

            <div class="drop__card">
                <div class="drop__data">
                    <svg style="margin-right: 5px" class="grab" width="18" height="18" viewBox="0 0 16 16" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path fillRule="evenodd" clipRule="evenodd"
                            d="M5 4C5.55228 4 6 3.55228 6 3C6 2.44772 5.55228 2 5 2C4.44772 2 4 2.44772 4 3C4 3.55228 4.44772 4 5 4ZM6 8C6 8.55228 5.55228 9 5 9C4.44772 9 4 8.55228 4 8C4 7.44772 4.44772 7 5 7C5.55228 7 6 7.44772 6 8ZM6 13C6 13.5523 5.55228 14 5 14C4.44772 14 4 13.5523 4 13C4 12.4477 4.44772 12 5 12C5.55228 12 6 12.4477 6 13ZM12 8C12 8.55228 11.5523 9 11 9C10.4477 9 10 8.55228 10 8C10 7.44772 10.4477 7 11 7C11.5523 7 12 7.44772 12 8ZM11 14C11.5523 14 12 13.5523 12 13C12 12.4477 11.5523 12 11 12C10.4477 12 10 12.4477 10 13C10 13.5523 10.4477 14 11 14ZM12 3C12 3.55228 11.5523 4 11 4C10.4477 4 10 3.55228 10 3C10 2.44772 10.4477 2 11 2C11.5523 2 12 2.44772 12 3Z"
                            fill="currentColor"></path>
                    </svg>
                    <img src="/img/ruta.png" alt="" class="drop__img" />
                    <div>
                        <h1 class="drop__name">Route</h1>

                        <input id="myRange3" class="sliderlp" value="100" max="100" min="0" type="range" />
                    </div>
                </div>

                <div class="checkbox-wrapper">
                    <input id="_checkbox-3" type="checkbox" />
                    <label for="_checkbox-3">
                        <div class="tick_mark"></div>
                    </label>
                </div>
            </div>

            <div class="drop__card">
                <div class="drop__data">
                    <svg style="margin-right: 5px" class="grab" width="18" height="18" viewBox="0 0 16 16" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M5 4C5.55228 4 6 3.55228 6 3C6 2.44772 5.55228 2 5 2C4.44772 2 4 2.44772 4 3C4 3.55228 4.44772 4 5 4ZM6 8C6 8.55228 5.55228 9 5 9C4.44772 9 4 8.55228 4 8C4 7.44772 4.44772 7 5 7C5.55228 7 6 7.44772 6 8ZM6 13C6 13.5523 5.55228 14 5 14C4.44772 14 4 13.5523 4 13C4 12.4477 4.44772 12 5 12C5.55228 12 6 12.4477 6 13ZM12 8C12 8.55228 11.5523 9 11 9C10.4477 9 10 8.55228 10 8C10 7.44772 10.44772 7 11 7C11.5523 7 12 7.44772 12 8ZM11 14C11.5523 14 12 13.5523 12 13C12 12.4477 11.5523 12 11 12C10.4477 12 10 12.4477 10 13C10 13.5523 10.4477 14 11 14ZM12 3C12 3.55228 11.5523 4 11 4C10.4477 4 10 3.55228 10 3C10 2.44772 10.44772 2 11 2C11.5523 2 12 2.44772 12 3Z"
                            fill="currentColor"></path>
                    </svg>
                    <img src="/img/grafo.png" alt="" class="drop__img" />
                    <div>
                        <h1 class="drop__name">Graph 4</h1>
                        <input id="myRange4" class="sliderlp" value="100" max="100" min="0" type="range" />
                    </div>
                </div>
                <div class="checkbox-wrapper">
                    <input id="_checkbox-4" type="checkbox" />
                    <label for="_checkbox-4">
                        <div class="tick_mark"></div>
                    </label>
                </div>
            </div>
        </div>

        <button class="cssbuttons-io-button">
            Add Layer
            <div class="icon">
                <svg height="24" width="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 0h24v24H0z" fill="none"></path>
                    <path d="M19 13H13V19H11V13H5V11H11V5H13V11H19V13Z" fill="currentColor"></path>
                </svg>
            </div>
        </button>
    </div>

    <div class="addLayer optionG" style="display: none;">
        <p class="fancy-text">Layer Panel</p>
        <div class="obj">
            <div class="objchild">
                <span class="inn6"></span>
                <span class="inn7"></span>
            </div>
        </div>

        <div class="option">
            <div class="btn-group">
                <button class="btn left" type="button" id="heatMapLayerB">Heat Map</button>
                <button class="btn middle" type="button" id="routeLayerB">Route</button>
                <button class="btn right" type="button" id="graphLayerB">Graph</button>
            </div>

            <div class="option-container" id="heatMapLayer-container" style="display: none;">

                <div tabindex="0" class="plusButton-layer" id="addHeatMapLayer">
                    <svg class="plusIcon-layer" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30">
                        <g mask="url(#mask0_21_345)">
                            <path
                                d="M13.75 23.75V16.25H6.25V13.75H13.75V6.25H16.25V13.75H23.75V16.25H16.25V23.75H13.75Z">
                            </path>
                        </g>
                    </svg>
                </div>

            </div>

            <div class="option-container" id="routeLayer-container" style="display: none;">
                <div tabindex="0" class="plusButton-layer" id="addRouteLayer">
                    <svg class="plusIcon-layer" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30">
                        <g mask="url(#mask0_21_345)">
                            <path
                                d="M13.75 23.75V16.25H6.25V13.75H13.75V6.25H16.25V13.75H23.75V16.25H16.25V23.75H13.75Z">
                            </path>
                        </g>
                    </svg>
                </div>
            </div>
            <div class="option-container" id="graphLayer-container" style="display: none;">
                <div tabindex="0" class="plusButton-layer" id="addGraphLayer">
                    <svg class="plusIcon-layer" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30">
                        <g mask="url(#mask0_21_345)">
                            <path
                                d="M13.75 23.75V16.25H6.25V13.75H13.75V6.25H16.25V13.75H23.75V16.25H16.25V23.75H13.75Z">
                            </path>
                        </g>
                    </svg>
                </div>
            </div>


        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script type="module">
        import { initLayerPanel } from './layerPanel.js';
        initLayerPanel();
    </script>
</body>

</html>
