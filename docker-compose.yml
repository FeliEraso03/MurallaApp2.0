version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: muralla-db
    environment:
      POSTGRES_DB: muralladb
      POSTGRES_USER: muralla
      POSTGRES_PASSWORD: muralla_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muralla -d muralladb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./muralla-backend
    container_name: muralla-backend
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/muralladb
      - SPRING_DATASOURCE_USERNAME=muralla
      - SPRING_DATASOURCE_PASSWORD=muralla_password
      - APP_FRONTEND_URL=http://localhost:80
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./muralla-backend/src/main/resources/data:/data # Optional for local data access

  frontend:
    build:
      context: ./muralla-frontend
    container_name: muralla-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
