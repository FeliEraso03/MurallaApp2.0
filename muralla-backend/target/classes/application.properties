server.port=8081

# ── PostgreSQL Database ─────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/muralladb
spring.datasource.username=muralla
spring.datasource.password=muralla_password
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ── JWT ──────────────────────────────────────────────
# Secret key (change this in production!)
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# ── Google OAuth2 ─────────────────────────────────────
# Replace these values with your real credentials from Google Cloud Console:
# https://console.cloud.google.com/ → APIs & Services → Credentials
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ── CORS / Frontend ───────────────────────────────────
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# ── Logging ───────────────────────────────────────────
logging.level.org.springframework.security=INFO
